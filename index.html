<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formulaire de Recrutement</title>

<style>
  body {
    margin: 0;
    background: #eef1f5;
    font-family: "Inter", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 450px;
    background: white;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    animation: fadeIn 0.5s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    margin-bottom: 25px;
    font-size: 24px;
    color: #222;
    font-weight: 600;
    text-align: center;
    width: 100%;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    box-sizing: border-box;
  }

  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
  }

  .yes { background: #4CAF50; color: white; }
  .yes:hover { background: #43a047; }

  .no { background: #e53935; color: white; }
  .no:hover { background: #d32f2f; }

  .hidden { display: none; }

  .refused {
    color: #e53935;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
    margin-top: 20px;
  }

  .success {
    color: #4CAF50;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
  }

  .discord-box {
    text-align: center;
    margin-top: 25px;
    width: 100%;
  }

  .discord-logo {
    width: 130px;
    height: auto;
    filter: drop-shadow(0 0 6px rgba(88,101,242,0.4));
    transition: 0.3s;
    cursor: pointer;
  }

  .discord-logo:hover {
    transform: scale(1.12);
  }

  .arrow {
    font-size: 32px;
    color: #5865F2;
    animation: bounce 1s infinite;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }

</style>
</head>
<body>

<div class="card">

  <!-- ÉTAPE 0 : INFOS PERSONNELLES -->
  <div id="info-step" style="width:100%;">
    <h2>Vos informations</h2>

    <input id="nom" placeholder="Nom">
    <input id="prenom" placeholder="Prénom">
    <input id="email" placeholder="Email">
    <input id="discord" placeholder="Discord (ex: ZerNox#0001)">
    <input id="numero" placeholder="Numéro de téléphone">

    <button class="btn yes" onclick="startForm()">Commencer</button>
  </div>

  <!-- ÉTAPE 1 : QUESTIONS -->
  <div id="question-step" class="hidden" style="width:100%;">
    <h2 id="question">Chargement...</h2>

    <button id="btn-yes" class="btn yes" onclick="answer('Oui')">Oui</button>
    <button id="btn-no" class="btn no" onclick="answer('Non')">Non</button>

    <div id="final" class="hidden">
      <button class="btn yes" onclick="sendForm()">Envoyer le formulaire</button>
    </div>

    <p id="result"></p>

    <div id="discord-section" class="hidden discord-box">
      <div class="arrow">⬇️</div>

      <a href="https://discord.gg/CptJeaPNNd" target="_blank">
        <img src="https://cdn.worldvectorlogo.com/logos/discord-6.svg"
             class="discord-logo">
      </a>
    </div>
  </div>

</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1515140308759744513/U-OawdXwrJ98uCh7K0zSsKoEeRXXV8sfLNduWtPEYQRTjfnaGv8aDaZnIEE5rp8Tr11F";

let userInfo = {};

function startForm() {
  const nom = document.getElementById("nom").value.trim();
  const prenom = document.getElementById("prenom").value.trim();
  const email = document.getElementById("email").value.trim();
  const discord = document.getElementById("discord").value.trim();
  const numero = document.getElementById("numero").value.trim();

  if (!nom || !prenom || !email || !discord || !numero) {
    alert("Merci de remplir toutes les informations.");
    return;
  }

  userInfo = { nom, prenom, email, discord, numero };

  document.getElementById("info-step").classList.add("hidden");
  document.getElementById("question-step").classList.remove("hidden");
  document.getElementById("question").innerText = questions[0].text;
}

const questions = [
  { text: "Êtes-vous motivé à travailler ?", requiredYes: true },
  { text: "Serez-vous toujours motivé si vous ne trouvez pas la bonne stratégie ?", requiredYes: true },
  { text: "Acceptez-vous les horaires 12h-22h30 ou 18h-2h ?", requiredYes: false },
  { text: "Avez-vous de l'expérience en marketing ?", requiredYes: false },
  { text: "Avez-vous de l'expérience en chatting ?", requiredYes: false }
];

let index = 0;
let answers = [];

function answer(rep) {
  const q = questions[index];
  answers.push({ question: q.text, reponse: rep });

  index++;

  if (index >= questions.length) {

    // On cache les boutons pour éviter le texte "Oui"
    document.getElementById("btn-yes").classList.add("hidden");
    document.getElementById("btn-no").classList.add("hidden");

    const valid =
      answers[0].reponse === "Oui" &&
      answers[1].reponse === "Oui";

    if (!valid) {
      document.getElementById("question").innerText = "Résultat";
      document.getElementById("result").innerHTML = "<div class='refused'>REFUSÉ</div>";
      return;
    }

    document.getElementById("question").innerText = "Formulaire terminé";
    document.getElementById("final").classList.remove("hidden");
    return;
  }

  document.getElementById("question").innerText = questions[index].text;
}

function sendForm() {
  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      content:
        "**Nouveau formulaire validé :**\n\n" +
        "**Informations personnelles :**\n" +
        `• Nom : ${userInfo.nom}\n` +
        `• Prénom : ${userInfo.prenom}\n` +
        `• Email : ${userInfo.email}\n` +
        `• Discord : ${userInfo.discord}\n` +
        `• Numéro : ${userInfo.numero}\n\n` +
        "**Réponses :**\n" +
        answers.map(a => `• ${a.question} : ${a.reponse}`).join("\n")
    })
  });

  document.getElementById("result").innerHTML =
    "<div class='success'>Formulaire envoyé !</div>";

  document.getElementById("discord-section").classList.remove("hidden");
}
</script>

</body>
</html>
